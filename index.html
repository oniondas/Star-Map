<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scientific Universe Map</title>
  </head>
  <body>
    <main id="app">
      <canvas id="universe"></canvas>
      <section class="hud" aria-label="Universe map controls">
        <div>
          <p class="eyebrow">Real Catalog Atlas</p>
          <h1>Universe Map</h1>
          <p id="statusText" class="status">Loading scientific catalogs...</p>
          <p id="countText" class="count">No synthetic objects</p>
          <p class="accuracy">Synthetic rendered objects: 0. Distances come from parallax, host-system distance, or redshift-derived comoving distance.</p>
        </div>
        <div class="search-container">
          <input type="text" id="searchInput" placeholder="Search star, galaxy, or exoplanet..." autocomplete="off" />
        </div>
        <fieldset>
          <legend>Layers</legend>
          <label class="check"><input type="checkbox" data-layer="gaia" checked /> Gaia stars</label>
          <label class="check"><input type="checkbox" data-layer="exoplanets" checked /> Exoplanet systems</label>
          <label class="check"><input type="checkbox" data-layer="ned" checked /> NED galaxies/quasars</label>
        </fieldset>
        <label>
          <span>Point size</span>
          <input id="sizeControl" type="range" min="0.45" max="2.5" value="1" step="0.05" />
        </label>
        <label>
          <span>Emission</span>
          <input id="intensityControl" type="range" min="0.5" max="2.7" value="1.25" step="0.05" />
        </label>
        <div class="actions">
          <button id="resetView" type="button">Reset view</button>
          <button id="refreshData" type="button">Refresh APIs</button>
        </div>
        <ul id="sourceList" class="sources" aria-label="Data sources"></ul>
      </section>
      <aside id="tooltip" class="tooltip" aria-live="polite"></aside>
      <div class="legend" aria-label="Catalog color legend">
        <span class="gaia">Stars</span>
        <span class="exo">Exoplanets</span>
        <span class="ned">Galaxies</span>
        <span class="qso">Quasars</span>
      </div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
